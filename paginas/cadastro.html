<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="../js/admin-redirect.js"></script>
    <title>Criar Conta</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <main class="cadastro-page">
      <button class="btn-voltar" onclick="window.location.href = '../index.html'">
        ← Voltar
      </button>

      <section class="cadastro-card">
        <h2>Criar conta</h2>

        <form class="cadastro-form" onsubmit="cadastrar(event)">
          <div class="linha">
            <div class="campo">
              <label>Nome <span>*</span></label>
              <input type="text" name="name" id="nome" required />
            </div>

            <div class="campo">
              <label>Sobrenome <span>*</span></label>
              <input type="text" id="sobrenome" required />
            </div>
          </div>

          <div class="campo">
            <label>CPF <span>*</span></label>
            <input type="text" id="cpf" required />
          </div>

          <div class="campo">
            <label>Telefone <span>*</span></label>
            <input type="tel" id="telefone" placeholder="(DDD) Telefone" required />
          </div>

          <div class="linha">
            <div class="campo">
              <label>Endereço <span>*</span></label>
              <input type="text" id="endereco" name="address" required />
            </div>
            <div class="campo">
              <label>Bairro <span>*</span></label>
              <input type="text" id="bairro" name="neighborhood" required />
            </div>
          </div>

          <div class="linha">
            <div class="campo">
              <label>Cidade <span>*</span></label>
              <input type="text" id="cidade" name="city" required />
            </div>
            <div class="campo">
              <label>Estado <span>*</span></label>
              <input type="text" id="estado" name="state" required />
            </div>
          </div>

          <div class="campo">
            <label>E-mail <span>*</span></label>
            <input type="email" id="email" required />
          </div>

          <div class="campo senha-area">
            <label>Senha <span>*</span></label>
            <input
              type="password"
              id="senha"
              placeholder="Mínimo de 6 caracteres"
              required
            />
            <button type="button" class="ver-senha" onclick="mostrarSenha()">
              👁
            </button>
          </div>

          <label class="consentimento-lgpd">
            <input
              type="checkbox"
              id="aceite-lgpd"
              disabled
            />
            <span>
              Li e concordo com os
              <a
                href="termos.html"
                data-documento-lgpd="termos"
              >Termos de uso</a>
              e com a
              <a
                href="privacidade.html"
                data-documento-lgpd="privacidade"
              >Política de Privacidade</a>,
              autorizando o uso dos meus dados para cadastro, pedidos e
              comunicação, conforme a LGPD.
            </span>
          </label>

          <div class="cadastro-footer cadastro-footer-cadastro">
            <button type="submit" class="btn-cadastrar">
              Cadastre-se
            </button>
          </div>
        </form>
      </section>
    </main>

    <div
      class="login-popup cadastro-popup"
      id="cadastroPopup"
      role="dialog"
      aria-modal="true"
      aria-labelledby="cadastroPopupMensagem"
    >
      <div class="login-popup-card cadastro-popup-card">
        <div
          class="login-popup-icone cadastro-popup-icone"
          id="cadastroPopupIcone"
          aria-hidden="true"
        ></div>
        <h2 id="cadastroPopupMensagem">
          Você precisa aceitar os Termos de uso e a Política de Privacidade.
        </h2>
        <div class="cadastro-popup-actions">
          <button type="button" onclick="confirmarCadastroPopup()">OK</button>
        </div>
      </div>
    </div>

    <script src="../js/cadastro.js"></script>
  </body>
</html>
